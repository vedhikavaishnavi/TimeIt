<!DOCTYPE html>
<html>
<head>
    <title>Egg Timer</title>
	<style>
		body {
			background-image: url("background.jpg");
			background-size: cover;
			background-repeat: no-repeat;
			background-position: center;
		}
		h1 {
			margin-bottom: 10px;
		}
		body {
			text-align: center;
				}
		button {
			font-size: 16px;
				}
		div {
			font-size: 25px;
			text-align: center;
		}
	</style>
</head>
<body align="center">
    <h1 align="center">Egg Timer</h1>

    <div id="timer" align="center">00:00</div>
	<br>
    <div align="center">
        <button class="soft" onclick="setSoft()">Soft Boiled (5 min)</button>
        <button class="hard" onclick="setHard()">Hard Boiled (10 min)</button>
    </div>
	<br>
    <div align="center">
        <button class="control" onclick="startTimer()">Start</button>
        <button class="control" onclick="pauseTimer()">Pause</button>
        <button class="control" onclick="resetTimer()">Reset</button>
    </div>

<script>
let timeLeft = 0;
let timerInterval = null;
let originalTime = 0;

function updateDisplay() {
    let minutes = Math.floor(timeLeft / 60);
    let seconds = timeLeft % 60;
    document.getElementById("timer").textContent =
        String(minutes).padStart(2, '0') + ":" +
        String(seconds).padStart(2, '0');
}

function setSoft() {
    timeLeft = 5 * 60; // 5 minutes
    originalTime = timeLeft;
    updateDisplay();
}

function setHard() {
    timeLeft = 10 * 60; // 10 minutes
    originalTime = timeLeft;
    updateDisplay();
}

function startTimer() {
    if (timerInterval !== null) return;

    timerInterval = setInterval(function() {
        if (timeLeft > 0) {
            timeLeft--;
            updateDisplay();
        } else {
            clearInterval(timerInterval);
            timerInterval = null;
            alert("Your egg is ready!");
        }
    }, 1000);
}

function pauseTimer() {
    clearInterval(timerInterval);
    timerInterval = null;
}

function resetTimer() {
    clearInterval(timerInterval);
    timerInterval = null;
    timeLeft = originalTime;
    updateDisplay();
}
</script>

</body>
</html>
