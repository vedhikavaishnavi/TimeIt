<!DOCTYPE html>
<html>
<head>
    <title>Bread Timer</title>
	<style>
		body {
			background-image: url("gingham.jpg");
			background-size: cover;
			background-repeat: no-repeat;
			background-position: center;
		}
		h1 {
			margin-bottom: 10px;
		}
		body {
			text-align: center;
		}
		button {
			font-size: 16px;
		}
		div {
			font-size: 25px;
			text-align: center;
		}
	</style>
</head>
<body>

<h1 align="center"> Bread Timer (3 mins)</h1>

<div id="timer" align="center">03:00</div>

<br>

<div>
<button onclick="startTimer()" align="center">Start</button>
<button onclick="pauseTimer()" align="center">Pause</button>
<button onclick="resetTimer()" align="center">Reset</button>
</div>

<script>
let timeLeft = 180; // 3 minutes
let originalTime = 180;
let timerInterval = null;

function updateDisplay() {
    let minutes = Math.floor(timeLeft / 60);
    let seconds = timeLeft % 60;
    document.getElementById("timer").textContent =
        String(minutes).padStart(2, '0') + ":" +
        String(seconds).padStart(2, '0');
}

function startTimer() {
    if (timerInterval !== null) return;

    timerInterval = setInterval(function() {
        if (timeLeft > 0) {
            timeLeft--;
            updateDisplay();
        } else {
            clearInterval(timerInterval);
            timerInterval = null;
            alert("Your toast is ready!");
        }
    }, 1000);
}

function pauseTimer() {
    clearInterval(timerInterval);
    timerInterval = null;
}

function resetTimer() {
    clearInterval(timerInterval);
    timerInterval = null;
    timeLeft = originalTime;
    updateDisplay();
}
</script>

</body>
</html>
